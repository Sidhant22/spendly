{% extends "base.html" %}
{% block title %}Analytics — Spendly{% endblock %}
{% block content %}
<section class="analytics-page">
    <div class="analytics-card">
        <div class="analytics-deco analytics-deco--tl"></div>
        <div class="analytics-deco analytics-deco--br"></div>

        <div class="analytics-icon-wrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
        </div>

        <span class="analytics-badge">COMING SOON</span>

        <h1 class="analytics-title">Advanced Analytics</h1>

        <p class="analytics-body">
            We're working on powerful insights and visualizations<br>
            to help you understand your spending patterns better.
        </p>

        <div class="analytics-dots">
            <span></span>
            <span class="analytics-dot--mid"></span>
            <span></span>
        </div>

        <p class="analytics-sub">We're crafting something special</p>
    </div>
</section>
{% endblock %}
